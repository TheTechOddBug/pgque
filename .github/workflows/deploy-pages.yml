name: Deploy website to GitHub Pages

# Builds the Astro + Starlight site in web/ and publishes it to GitHub Pages.
# The site reads docs/*.md in place, so doc edits trigger a rebuild too.
# Custom domain is set via web/public/CNAME (pgque.dev).

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Build site
        working-directory: web
        run: bun run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
