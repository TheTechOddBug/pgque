name: Website build check

# Validate the Astro + Starlight site builds on every PR that touches the site
# or the docs it renders, so build breaks never reach main (where deploy runs).

on:
  pull_request:
    paths:
      - 'web/**'
      - 'docs/**'
      - '.github/workflows/web-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Build site
        working-directory: web
        run: bun run build
